<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Lokesh Anumula | Professional Outreach</title>
    <meta name="description" content="Get in touch with Lokesh Anumula for software internships, frontend development roles, or technical collaborations.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header role="banner">
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section aria-labelledby="contact-heading">
            <h2 id="contact-heading">Get In Touch</h2>
            <p>Feel free to reach out to discuss internship opportunities or collaborative development work.</p>
            
            <form action="#" method="POST" autocomplete="on">
                <div class="form-container">
                    <label for="user-name">Full Name:</label>
                    <input type="text" id="user-name" name="name" required aria-required="true" autocomplete="name">
                </div>

                <div class="form-container">
                    <label for="user-email">Email Address:</label>
                    <input type="email" id="user-email" name="email" required aria-required="true" autocomplete="email">
                </div>

                <div class="form-container">
                    <label for="user-message">Message Details:</label>
                    <textarea id="user-message" name="message" rows="6" required aria-required="true"></textarea>
                </div>

                <button type="submit" aria-label="Send message to Lokesh Anumula">Submit Inquiry</button>
            </form>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 Lokesh Anumula. All rights reserved.</p>
    </footer>

</body>
</html>
